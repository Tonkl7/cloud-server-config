version: '3.8'

services:
    db:
        image: mariadb
        container_name: nextcloud-db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: ^gBMajgSS@
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: admin
            MYSQL_PASSWORD: 632552
        volumes:
            - ./cloud-data/db:/var/lib/mysql

    app:
        image: nextcloud
        container_name: nextcloud-app
        restart: always
        ports:
            - "8080:80"
        environment:
            MYSQL_HOST: db
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: admin
            MYSQL_PASSWORD: 632552
        volumes:
            - ./cloud-data/app:/var/www/html
        depends_on:
            - db
